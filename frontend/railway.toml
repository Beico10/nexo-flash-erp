# Railway — Frontend Next.js
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.frontend"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[deploy.envVars]]
name = "NODE_ENV"
value = "production"

[[deploy.envVars]]
name = "NEXT_TELEMETRY_DISABLED"
value = "1"
