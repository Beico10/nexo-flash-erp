# =============================================================================
# NEXO FLASH ERP — Docker Compose PRODUÇÃO
# Hetzner VPS — máxima segurança, mínimo custo
#
# Stack:
#   PostgreSQL 16  — banco principal (RLS multi-tenant)
#   Redis 7        — cache + sessões JWT
#   NATS JetStream — event bus interno
#   Traefik v3     — reverse proxy + TLS automático (Let's Encrypt)
#   Nexo API       — backend Go (imagem scratch ~10MB)
#   Watchtower     — auto-update das imagens (opcional)
# =============================================================================

services:

  # ─── Traefik — API Gateway + TLS automático ─────────────────────────────────
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      # TLS automático via Let's Encrypt
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-deploy@example.com}
      - --certificatesresolvers.le.acme.storage=/certs/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certresolver=le
      # Segurança: headers modernos
      - --entrypoints.websecure.http.middlewares=security-headers@docker
      # Docker provider
      - --providers.docker=true
      - --providers.docker.network=nexo-net
      - --providers.docker.exposedbydefault=false
      # Logs de acesso
      - --accesslog=true
      - --accesslog.filepath=/logs/access.log
      - --log.level=WARN
      # Dashboard desabilitado em produção
      - --api=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
      - traefik_logs:/logs
    networks: [nexo-net]
    labels:
      # Headers de segurança globais
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin"
      # Rate limiting global
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"

  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexoflash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c row_security=on
        -c log_min_duration_statement=1000
        -c log_connections=on
        -c ssl=on
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexoflash"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # NÃO expor porta 5432 para o mundo externo
    networks: [nexo-net]

  # ─── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --rename-command FLUSHDB ""
        --rename-command FLUSHALL ""
        --rename-command CONFIG ""
        --rename-command DEBUG ""
        --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [nexo-net]

  # ─── NATS JetStream ───────────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: >
      -js
      -sd /data
      --max_payload 4MB
      --user ${NATS_USER}
      --pass ${NATS_PASSWORD}
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [nexo-net]

  # ─── Nexo Flash API ───────────────────────────────────────────────────────────
  api:
    image: nexoflash-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://app_user:${APP_DB_PASSWORD}@postgres:5432/nexoflash?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      nats:     { condition: service_healthy }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      - "traefik.http.routers.api.middlewares=rate-limit@docker,security-headers@docker"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [nexo-net]
    # Limitar recursos (ajuste conforme o plano do VPS)
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 256M

  # ─── Backup automático do PostgreSQL ─────────────────────────────────────────
  # Roda todo dia às 2h e envia para bucket S3-compatível (Hetzner Object Storage)
  backup:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
    volumes:
      - backups:/backups
    entrypoint: >
      sh -c "
        pg_dump -h postgres -U postgres -d nexoflash -Fc > /backups/nexoflash_$$(date +%Y%m%d_%H%M%S).dump &&
        find /backups -name '*.dump' -mtime +7 -delete &&
        echo 'Backup concluído'
      "
    depends_on:
      postgres: { condition: service_healthy }
    networks: [nexo-net]
    profiles: [backup] # ativar com: docker compose --profile backup up backup

volumes:
  postgres_data:
  redis_data:
  nats_data:
  traefik_certs:
  traefik_logs:
  backups:

networks:
  nexo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
